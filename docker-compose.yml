services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: elys
      POSTGRES_USER: elys_user
      POSTGRES_PASSWORD: elys_pass
    ports:
      - "127.0.0.1:5439:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
